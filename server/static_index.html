<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DROPBEAR // TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
/* ── Reset & Root ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #080c0f;
  --bg2:        #0d1317;
  --bg3:        #111820;
  --border:     #1d2d3a;
  --border2:    #253545;
  --amber:      #e8a020;
  --amber-dim:  #7a5010;
  --amber-glow: rgba(232,160,32,0.12);
  --green:      #39e87a;
  --green-dim:  #1a6035;
  --cyan:       #38d4e8;
  --cyan-dim:   #1a5f6a;
  --red:        #e84a4a;
  --text:       #c8d8e4;
  --text-dim:   #5a7a8a;
  --text-bright:#eef4f8;
  --mono:       'Share Tech Mono', monospace;
  --cond:       'Barlow Condensed', sans-serif;
  --body:       'Barlow', sans-serif;
  --radius:     3px;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.06) 2px,
    rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── Login Screen ─────────────────────────────────────────────────── */
#login-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 100;
  flex-direction: column;
  gap: 0;
}

.login-box {
  width: 380px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  padding: 48px 40px 44px;
  position: relative;
}

.login-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--amber), transparent);
}

.login-logo {
  font-family: var(--cond);
  font-weight: 900;
  font-size: 42px;
  letter-spacing: 0.12em;
  color: var(--amber);
  text-shadow: 0 0 40px rgba(232,160,32,0.5);
  text-align: center;
  margin-bottom: 4px;
}

.login-sub {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 40px;
  text-transform: uppercase;
}

.login-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--amber-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.login-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text-bright);
  font-family: var(--mono);
  font-size: 15px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  border-radius: var(--radius);
}

.login-input:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 3px var(--amber-glow);
}

.login-btn {
  width: 100%;
  margin-top: 20px;
  padding: 11px;
  background: transparent;
  border: 1px solid var(--amber);
  color: var(--amber);
  font-family: var(--cond);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, box-shadow 0.2s;
  border-radius: var(--radius);
}

.login-btn:hover {
  background: var(--amber);
  color: var(--bg);
  box-shadow: 0 0 24px rgba(232,160,32,0.35);
}

/* ── App Shell ────────────────────────────────────────────────────── */
#app {
  display: none;
  height: 100vh;
  flex-direction: column;
}

#app.visible { display: flex; }

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  height: 48px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  flex-shrink: 0;
  gap: 0;
  position: relative;
}

.topbar::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--amber-dim) 30%, var(--amber-dim) 70%, transparent 100%);
  opacity: 0.5;
}

.topbar-logo {
  font-family: var(--cond);
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 0.15em;
  color: var(--amber);
  text-shadow: 0 0 20px rgba(232,160,32,0.4);
  margin-right: 24px;
}

.topbar-divider {
  width: 1px;
  height: 22px;
  background: var(--border2);
  margin: 0 20px;
}

.topbar-tabs {
  display: flex;
  gap: 2px;
  flex: 1;
}

.tab-btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 6px 16px;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  border-radius: var(--radius);
}

.tab-btn:hover { color: var(--text); border-color: var(--border2); }
.tab-btn.active {
  color: var(--amber);
  border-color: var(--amber-dim);
  background: var(--amber-glow);
}

.topbar-user {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
}

.topbar-user .dot {
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ── Main content area ────────────────────────────────────────────── */
.main {
  flex: 1;
  overflow: hidden;
  display: flex;
}

.panel {
  display: none;
  flex: 1;
  overflow: hidden;
}

.panel.active { display: flex; }

/* ── CHAT PANEL ───────────────────────────────────────────────────── */
.chat-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Sidebar */
.chat-sidebar {
  width: 200px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
}

.sidebar-section {
  padding: 16px 16px 8px;
}

.sidebar-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--amber-dim);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

#user-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

#user-list li {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  padding: 3px 6px;
  display: flex;
  align-items: center;
  gap: 7px;
}

#user-list li::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--green);
  flex-shrink: 0;
}

#user-list li.is-you { color: var(--amber); }

/* Chat main */
.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Status strip */
.chat-status-strip {
  height: 28px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 20px;
  flex-shrink: 0;
}

.status-item {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-item span { color: var(--cyan); }

/* Messages */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  scroll-behavior: smooth;
}

#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.msg {
  display: flex;
  gap: 12px;
  padding: 4px 6px;
  border-radius: var(--radius);
  transition: background 0.1s;
  animation: msgIn 0.15s ease-out;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg:hover { background: var(--bg3); }

.msg-ts {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  flex-shrink: 0;
  margin-top: 3px;
  width: 60px;
  text-align: right;
}

.msg-user {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: normal;
  flex-shrink: 0;
  width: 120px;
  text-align: right;
  margin-top: 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.msg-body {
  font-family: var(--body);
  font-size: 14px;
  color: var(--text-bright);
  flex: 1;
  word-break: break-word;
  line-height: 1.45;
}

.msg.system .msg-user { color: var(--text-dim); font-style: italic; }
.msg.system .msg-body { color: var(--text-dim); font-style: italic; font-size: 12px; }

/* Input bar */
.chat-input-bar {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-shrink: 0;
}

.chat-prompt {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--amber);
  flex-shrink: 0;
}

#chat-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-bright);
  font-family: var(--mono);
  font-size: 13px;
  caret-color: var(--amber);
}

#chat-input::placeholder { color: var(--text-dim); }

.send-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: var(--radius);
  flex-shrink: 0;
}

.send-btn:hover {
  border-color: var(--amber);
  color: var(--amber);
}

/* ── REPO PANEL ───────────────────────────────────────────────────── */
.repo-layout {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Repo toolbar */
.repo-toolbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.repo-title {
  font-family: var(--cond);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.upload-zone-wrapper {
  flex: 1;
  display: flex;
  justify-content: flex-end;
}

/* Upload drop zone */
#drop-zone {
  border: 1px dashed var(--border2);
  background: transparent;
  padding: 8px 20px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
  border-radius: var(--radius);
  position: relative;
}

#drop-zone:hover, #drop-zone.drag-over {
  border-color: var(--amber);
  background: var(--amber-glow);
}

#drop-zone.drag-over {
  box-shadow: 0 0 20px var(--amber-glow);
}

#file-input { display: none; }

.drop-icon {
  font-size: 16px;
  line-height: 1;
}

.drop-text {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
}

.drop-text strong { color: var(--amber); }

/* Upload progress */
.upload-progress-bar {
  display: none;
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--border);
  overflow: hidden;
  border-radius: 0 0 var(--radius) var(--radius);
}

.upload-progress-fill {
  height: 100%;
  background: var(--amber);
  width: 0%;
  transition: width 0.2s;
}

/* File list */
.file-list-container {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.file-list-container::-webkit-scrollbar { width: 4px; }
.file-list-container::-webkit-scrollbar-track { background: transparent; }
.file-list-container::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* File list header */
.file-list-header {
  display: grid;
  grid-template-columns: 1fr 90px 160px 120px 48px;
  padding: 8px 20px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  position: sticky;
  top: 0;
  z-index: 1;
}

#file-list {
  list-style: none;
}

.file-item {
  display: grid;
  grid-template-columns: 1fr 90px 160px 120px 48px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  transition: background 0.1s;
  animation: msgIn 0.15s ease-out;
}

.file-item:hover { background: var(--bg3); }

.file-name {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-bright);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-right: 16px;
}

.file-ext {
  display: inline-block;
  font-size: 10px;
  padding: 1px 5px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--cyan);
  border-radius: 2px;
  margin-right: 8px;
  vertical-align: middle;
  font-family: var(--mono);
  letter-spacing: 0.05em;
}

.file-size {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
}

.file-modified {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
}

.file-hash {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

.file-actions {
  display: flex;
  gap: 4px;
  justify-content: flex-end;
}

.file-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 8px;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: var(--radius);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}

.file-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.file-btn.del:hover { border-color: var(--red); color: var(--red); }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  color: var(--text-dim);
  gap: 12px;
}

.empty-icon {
  font-size: 40px;
  opacity: 0.3;
}

.empty-text {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.1em;
}

/* Repo status bar */
.repo-statusbar {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 5px 20px;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-shrink: 0;
}

.repo-stat {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}

.repo-stat b { color: var(--amber); font-weight: normal; }

/* ── Toast notifications ──────────────────────────────────────────── */
#toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--green);
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  border-radius: var(--radius);
  animation: toastIn 0.2s ease-out;
  max-width: 320px;
}

.toast.error { border-left-color: var(--red); }
.toast.warn  { border-left-color: var(--amber); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── Connection status ────────────────────────────────────────────── */
.conn-status {
  font-family: var(--mono);
  font-size: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.conn-status.connected { color: var(--green); border-color: var(--green-dim); }
.conn-status.disconnected { color: var(--red); border-color: #6a1a1a; }
.conn-status.connecting { color: var(--amber); border-color: var(--amber-dim); }

.conn-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
</style>
</head>
<body>

<!-- ── Login Screen ─────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">DROPBEAR</div>
    <div class="login-sub">team · secure · internal</div>
    <label class="login-label" for="username-input">callsign</label>
    <input
      class="login-input"
      id="username-input"
      type="text"
      maxlength="24"
      placeholder="enter your handle"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="login-btn" id="login-btn">AUTHENTICATE</button>
  </div>
</div>

<!-- ── App ──────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-logo">DROPBEAR</div>
    <div class="topbar-divider"></div>
    <div class="topbar-tabs">
      <button class="tab-btn active" data-panel="chat">
        ⬡ COMMS
      </button>
      <button class="tab-btn" data-panel="repo">
        ⬡ REPOSITORY
      </button>
    </div>
    <div id="conn-indicator" class="conn-status connecting">
      <div class="conn-dot"></div>
      <span>CONNECTING</span>
    </div>
    <div class="topbar-divider"></div>
    <div class="topbar-user">
      <div class="dot"></div>
      <span id="topbar-username">—</span>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Chat Panel -->
    <div class="panel active" id="panel-chat">
      <div class="chat-layout">

        <!-- Sidebar -->
        <div class="chat-sidebar">
          <div class="sidebar-section">
            <div class="sidebar-title">Online</div>
            <ul id="user-list"></ul>
          </div>
        </div>

        <!-- Chat main -->
        <div class="chat-main">
          <div class="chat-status-strip">
            <div class="status-item">channel <span>#general</span></div>
            <div class="status-item" id="online-count">online <span>0</span></div>
          </div>
          <div id="messages"></div>
          <div class="chat-input-bar">
            <span class="chat-prompt" id="chat-prompt">▸</span>
            <input
              id="chat-input"
              type="text"
              maxlength="2000"
              placeholder="type a message…"
              autocomplete="off"
              spellcheck="false"
            />
            <button class="send-btn" id="send-btn">SEND ↵</button>
          </div>
        </div>

      </div>
    </div>

    <!-- Repo Panel -->
    <div class="panel" id="panel-repo">
      <div class="repo-layout">

        <div class="repo-toolbar">
          <div class="repo-title">data repository</div>
          <div class="upload-zone-wrapper">
            <div id="drop-zone">
              <span class="drop-icon">⊕</span>
              <span class="drop-text">drop files or <strong>click to upload</strong></span>
              <input id="file-input" type="file" multiple />
              <div class="upload-progress-bar" id="upload-progress">
                <div class="upload-progress-fill" id="upload-fill"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="file-list-header">
          <div>name</div>
          <div>size</div>
          <div>modified</div>
          <div>sha256</div>
          <div></div>
        </div>

        <div class="file-list-container">
          <ul id="file-list">
            <li>
              <div class="empty-state">
                <div class="empty-icon">◫</div>
                <div class="empty-text">repository is empty</div>
              </div>
            </li>
          </ul>
        </div>

        <div class="repo-statusbar">
          <div class="repo-stat">files: <b id="stat-count">0</b></div>
          <div class="repo-stat">total size: <b id="stat-size">0 B</b></div>
        </div>

      </div>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────
let username = '';
let ws = null;
let wsReconnectTimer = null;

// ── User colors ──────────────────────────────────────────────────────────
const USER_COLORS = [
  '#38d4e8', '#e87a38', '#a078e8', '#e8d038',
  '#38e8a0', '#e84a7a', '#78d438', '#e8b038',
];
const userColorMap = {};
function getUserColor(u) {
  if (!userColorMap[u]) {
    const h = [...u].reduce((a, c) => a + c.charCodeAt(0), 0);
    userColorMap[u] = USER_COLORS[h % USER_COLORS.length];
  }
  return userColorMap[u];
}

// ── Login ────────────────────────────────────────────────────────────────
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('username-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  const val = document.getElementById('username-input').value.trim().replace(/\s+/g, '_');
  if (!val) {
    document.getElementById('username-input').focus();
    return;
  }
  username = val;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('topbar-username').textContent = username;
  document.getElementById('chat-prompt').textContent = `${username} ▸`;
  connectWS();
  loadFiles();
}

// ── WebSocket ────────────────────────────────────────────────────────────
function setConnStatus(state) {
  const el = document.getElementById('conn-indicator');
  el.className = 'conn-status ' + state;
  const labels = { connected: 'CONNECTED', disconnected: 'OFFLINE', connecting: 'CONNECTING' };
  el.querySelector('span').textContent = labels[state] || state.toUpperCase();
}

function connectWS() {
  clearTimeout(wsReconnectTimer);
  setConnStatus('connecting');
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/${encodeURIComponent(username)}`);

  ws.onopen = () => setConnStatus('connected');

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'userlist') {
      renderUserList(msg.users);
    } else if (msg.type === 'chat' || msg.type === 'system') {
      appendMessage(msg);
    }
  };

  ws.onclose = () => {
    setConnStatus('disconnected');
    wsReconnectTimer = setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

// ── Chat ─────────────────────────────────────────────────────────────────
function appendMessage(msg) {
  const container = document.getElementById('messages');
  const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;

  const div = document.createElement('div');
  div.className = 'msg' + (msg.type === 'system' ? ' system' : '');

  const ts = document.createElement('div');
  ts.className = 'msg-ts';
  ts.textContent = msg.ts || '';

  const user = document.createElement('div');
  user.className = 'msg-user';
  if (msg.type === 'system') {
    user.textContent = '··';
  } else {
    user.textContent = msg.user || '';
    user.style.color = getUserColor(msg.user || '');
  }

  const body = document.createElement('div');
  body.className = 'msg-body';
  body.textContent = msg.text || '';

  div.appendChild(ts);
  div.appendChild(user);
  div.appendChild(body);
  container.appendChild(div);

  if (atBottom) container.scrollTop = container.scrollHeight;
}

function renderUserList(users) {
  const ul = document.getElementById('user-list');
  ul.innerHTML = '';
  document.getElementById('online-count').querySelector('span').textContent = users.length;
  users.forEach(u => {
    const li = document.createElement('li');
    li.textContent = u;
    li.style.color = getUserColor(u);
    if (u === username) { li.classList.add('is-you'); li.style.color = '#e8a020'; }
    ul.appendChild(li);
  });
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ text }));
  input.value = '';
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Tabs ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    if (btn.dataset.panel === 'repo') loadFiles();
  });
});

// ── File Repository ──────────────────────────────────────────────────────
function humanSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1073741824).toFixed(2) + ' GB';
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) +
    ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function getExt(name) {
  const i = name.lastIndexOf('.');
  return i >= 0 ? name.slice(i + 1).toUpperCase() : '—';
}

async function loadFiles() {
  try {
    const res = await fetch('/api/files');
    const files = await res.json();
    renderFileList(files);
  } catch (err) {
    toast('Failed to load files', 'error');
  }
}

function renderFileList(files) {
  const ul = document.getElementById('file-list');
  ul.innerHTML = '';

  if (files.length === 0) {
    ul.innerHTML = `
      <li>
        <div class="empty-state">
          <div class="empty-icon">◫</div>
          <div class="empty-text">repository is empty — drop files to upload</div>
        </div>
      </li>`;
    document.getElementById('stat-count').textContent = '0';
    document.getElementById('stat-size').textContent = '0 B';
    return;
  }

  let totalSize = 0;
  files.forEach(f => {
    totalSize += f.size;
    const li = document.createElement('li');
    li.className = 'file-item';
    li.innerHTML = `
      <div class="file-name">
        <span class="file-ext">${getExt(f.name)}</span>${f.name}
      </div>
      <div class="file-size">${humanSize(f.size)}</div>
      <div class="file-modified">${fmtDate(f.modified)}</div>
      <div class="file-hash">${f.sha256}</div>
      <div class="file-actions">
        <a class="file-btn" href="/api/files/${encodeURIComponent(f.name)}" download="${f.name}" title="download">↓</a>
        <button class="file-btn del" data-name="${f.name}" title="delete">✕</button>
      </div>
    `;
    li.querySelector('.del').addEventListener('click', () => deleteFile(f.name));
    ul.appendChild(li);
  });

  document.getElementById('stat-count').textContent = files.length;
  document.getElementById('stat-size').textContent = humanSize(totalSize);
}

async function deleteFile(name) {
  if (!confirm(`Delete "${name}"?`)) return;
  try {
    const res = await fetch(`/api/files/${encodeURIComponent(name)}`, { method: 'DELETE' });
    if (res.ok) { toast(`Deleted: ${name}`, 'warn'); loadFiles(); }
    else toast('Delete failed', 'error');
  } catch { toast('Delete failed', 'error'); }
}

// ── Upload ───────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { uploadFiles(fileInput.files); fileInput.value = ''; });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  uploadFiles(e.dataTransfer.files);
});

async function uploadFiles(fileList) {
  for (const file of fileList) {
    await uploadOne(file);
  }
  loadFiles();
}

async function uploadOne(file) {
  const progressBar = document.getElementById('upload-progress');
  const fill = document.getElementById('upload-fill');
  progressBar.style.display = 'block';
  fill.style.width = '0%';

  const fd = new FormData();
  fd.append('file', file);
  fd.append('uploader', username);

  try {
    // Fake progress animation while uploading
    let prog = 0;
    const iv = setInterval(() => {
      prog = Math.min(prog + Math.random() * 15, 85);
      fill.style.width = prog + '%';
    }, 120);

    const res = await fetch('/api/files', { method: 'POST', body: fd });
    clearInterval(iv);

    if (res.ok) {
      fill.style.width = '100%';
      const data = await res.json();
      toast(`Uploaded: ${data.name} (${humanSize(data.size)})`);
    } else {
      const err = await res.json().catch(() => ({}));
      toast(err.detail || 'Upload failed', 'error');
    }
  } catch {
    toast('Upload failed', 'error');
  } finally {
    setTimeout(() => { progressBar.style.display = 'none'; fill.style.width = '0%'; }, 600);
  }
}

// ── Toast ────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' error' : type === 'warn' ? ' warn' : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
</script>
</body>
</html>
